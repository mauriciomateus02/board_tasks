version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: board_tasks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./board_tasks_api
    ports:
      - "8000:8000"
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=board_tasks
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - APP_KEY=${APP_KEY}
      - MAIL_MAILER=${MAIL_MAILER}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
      - MAIL_FROM_NAME="Board Tasks"
    depends_on:
      - postgres
      - mailhog
    volumes:
      - ./board_tasks_api:/var/www
    command: sh -c "composer install --no-dev --optimize-autoloader --no-interaction && php artisan migrate --seed && php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    build: ./board_task_front
    ports:
      - "4173:4173"
    depends_on:
      - api

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data: